{% extends 'store/base.html' %} 
{% block content %}
<div class="container d-flex flex-column vh-100 mt-4">
  <div class="d-flex flex-grow-1 justify-content-center align-items-center">
    <div class="card shadow border-0 p-4" style="max-width: 450px; width: 100%">
      <h3 class="fw-bold mb-4 text-center">Register</h3>
      <form method="post">
        {% csrf_token %} {{ form.as_p }}
        <button
          type="submit"
          class="btn text-white fw-bold w-100 py-2"
          style="background-color: #fe624b; border-color: #fe624b"
        >
          Create Account
        </button>
      </form>
      <div class="text-center mt-3">
        <p class="small">
          Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>
      </div>
    </div>
  </div>

  <!-- footer -->
  <div
    class="d-flex flex-column flex-md-row justify-content-between py-2 my-4 border-top align-items-center"
  >
    <div class="col-md-4 d-flex align-items-center">
      <span class="text-body-secondary small"
        >© 2026 IOT-Store. All rights reserved.</span
      >
    </div>

    <div class="d-flex flex-wrap gap-4 justify-content-center my-3 my-md-0">
      <div class="d-flex align-items-center">
        <i class="bi bi-telephone-fill me-2" style="color: #fe624b"></i>
        <small class="text-body-secondary">+95 9 123 456 789</small>
      </div>
      <div class="d-flex align-items-center">
        <i class="bi bi-envelope-fill me-2" style="color: #fe624b"></i>
        <small class="text-body-secondary">iotstore@email.com</small>
      </div>
    </div>

    <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
      <li class="ms-3">
        <a class="text-body-secondary fs-5" href="#"
          ><i class="bi bi-facebook"></i
        ></a>
      </li>
      <li class="ms-3">
        <a class="text-body-secondary fs-5" href="#"
          ><i class="bi bi-instagram"></i
        ></a>
      </li>
      <li class="ms-3">
        <a class="text-body-secondary fs-5" href="#"
          ><i class="bi bi-messenger"></i
        ></a>
      </li>
      <li class="ms-3">
        <a class="text-body-secondary fs-5" href="#"
          ><i class="bi bi-tiktok"></i
        ></a>
      </li>
    </ul>
  </div>
</div>

{% endblock %}
